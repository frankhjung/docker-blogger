---
name: Build and Push Docker Image (DockerHub and GHCR)

# yamllint disable-line rule:truthy
on:
  push:
    branches: ["main"]
    tags-ignore: ["*"]
  check_run:
    types: [rerequested, requested_action]
  pull_request:
    branches: ["main"]
# yamllint enable

jobs:
  docker:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: Read version from project
        id: version
        run: |
          VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' src/blogger/__init__.py)
          if [ -z "${VERSION}" ]; then
            echo "::error::Could not extract version from src/blogger/__init__.py"
            exit 1
          fi
          echo "PUBLISHING_VERSION=${VERSION}" >> ${GITHUB_OUTPUT}

      - name: set up qemu
        uses: docker/setup-qemu-action@v3

      - name: set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: login to docker hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: log in to github container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: transform repository name
        id: repo_name
        run: |
          IMAGE_NAME=$(echo "${{ github.repository }}" | sed 's/docker-//')
          echo "IMAGE_NAME=${IMAGE_NAME}" >> ${GITHUB_OUTPUT}

      - name: build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.repo_name.outputs.IMAGE_NAME }}:latest
            ${{ steps.repo_name.outputs.IMAGE_NAME }}:${{ github.sha }}
            ${{ steps.repo_name.outputs.IMAGE_NAME }}:${{ steps.version.outputs.PUBLISHING_VERSION }}
            ghcr.io/${{ steps.repo_name.outputs.IMAGE_NAME }}:latest
            ghcr.io/${{ steps.repo_name.outputs.IMAGE_NAME }}:${{ github.sha }}
            ghcr.io/${{ steps.repo_name.outputs.IMAGE_NAME }}:${{ steps.version.outputs.PUBLISHING_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
